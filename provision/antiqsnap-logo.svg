<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <!-- App icon rounded rect clip -->
    <clipPath id="roundedClip">
      <rect width="120" height="120" rx="26" ry="26"/>
    </clipPath>

    <!-- Background gradient: warm aged parchment to deep antiquity -->
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#3D1F0A"/>
      <stop offset="100%" stop-color="#1A0A02"/>
    </radialGradient>

    <!-- Gold shimmer gradient for medallion -->
    <radialGradient id="goldGrad" cx="45%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#F5D87A"/>
      <stop offset="40%" stop-color="#C9932A"/>
      <stop offset="80%" stop-color="#8B5E10"/>
      <stop offset="100%" stop-color="#6B420A"/>
    </radialGradient>

    <!-- Lens gradient -->
    <radialGradient id="lensGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#D4EFFF" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#7BC8E8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1A5F8A" stop-opacity="0.8"/>
    </radialGradient>

    <!-- Lens reflection -->
    <radialGradient id="lensReflect" cx="30%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Texture noise overlay -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- App background -->
  <rect width="120" height="120" rx="26" ry="26" fill="url(#bgGrad)" clip-path="url(#roundedClip)"/>

  <!-- Subtle grain texture overlay -->
  <rect width="120" height="120" rx="26" ry="26" fill="#6B3A1A" opacity="0.08" filter="url(#grain)" clip-path="url(#roundedClip)"/>

  <!-- ── Ornate outer ring / medallion ── -->
  <g clip-path="url(#roundedClip)" filter="url(#shadow)">
    <!-- Outer decorative ring -->
    <circle cx="60" cy="62" r="46" fill="none" stroke="url(#goldGrad)" stroke-width="2.2" opacity="0.85"/>
    <!-- Dashed inner ornament ring -->
    <circle cx="60" cy="62" r="42" fill="none" stroke="#C9932A" stroke-width="0.8" stroke-dasharray="3.2 2.8" opacity="0.6"/>

    <!-- Eight compass ornament dots on outer ring -->
    <g fill="#F0C050" opacity="0.9">
      <circle cx="60"   cy="16.5" r="2"/>
      <circle cx="92.2" cy="29.8" r="1.5"/>
      <circle cx="105.5" cy="62" r="2"/>
      <circle cx="92.2" cy="94.2" r="1.5"/>
      <circle cx="60"   cy="107.5" r="2"/>
      <circle cx="27.8" cy="94.2" r="1.5"/>
      <circle cx="14.5" cy="62" r="2"/>
      <circle cx="27.8" cy="29.8" r="1.5"/>
    </g>
  </g>

  <!-- ── Magnifying glass handle ── -->
  <g clip-path="url(#roundedClip)" filter="url(#glow)">
    <!-- Handle rod -->
    <line x1="79" y1="82" x2="97" y2="100" stroke="#8B5E10" stroke-width="6" stroke-linecap="round"/>
    <!-- Handle highlight -->
    <line x1="79" y1="82" x2="97" y2="100" stroke="#D4A84B" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- ── Magnifying glass body ── -->
  <g clip-path="url(#roundedClip)">
    <!-- Outer ring of magnifier -->
    <circle cx="55" cy="57" r="28" fill="#1C0D03" stroke="url(#goldGrad)" stroke-width="5"/>
    <!-- Inner lens fill -->
    <circle cx="55" cy="57" r="23" fill="url(#lensGrad)" opacity="0.88"/>
    <!-- Lens reflection highlight -->
    <circle cx="55" cy="57" r="23" fill="url(#lensReflect)"/>

    <!-- ── Antique vase silhouette inside lens ── -->
    <g opacity="0.82">
      <!-- Vase body shape -->
      <path d="
        M55 38
        C55 38, 63 41, 65 48
        C67 54, 64 60, 64 64
        C64 70, 66 73, 64 76
        L46 76
        C44 73, 46 70, 46 64
        C46 60, 43 54, 45 48
        C47 41, 55 38, 55 38Z
      " fill="#8B5010" stroke="#C9932A" stroke-width="0.8"/>

      <!-- Vase neck -->
      <path d="M51 38 Q55 35 59 38" fill="none" stroke="#C9932A" stroke-width="1.2"/>

      <!-- Vase foot / base -->
      <rect x="47" y="75" width="16" height="3" rx="1.5" fill="#7A4510" stroke="#C9932A" stroke-width="0.6"/>

      <!-- Decorative band on vase -->
      <path d="M47 55 Q55 52 63 55" fill="none" stroke="#F0C050" stroke-width="0.9" opacity="0.8"/>
      <path d="M46.5 63 Q55 60 63.5 63" fill="none" stroke="#F0C050" stroke-width="0.9" opacity="0.8"/>

      <!-- Small greek/arabesque pattern dots on vase -->
      <circle cx="52" cy="59" r="1" fill="#F0C050" opacity="0.7"/>
      <circle cx="55" cy="57.5" r="1" fill="#F0C050" opacity="0.7"/>
      <circle cx="58" cy="59" r="1" fill="#F0C050" opacity="0.7"/>
    </g>

    <!-- Lens edge sheen -->
    <circle cx="55" cy="57" r="23" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
    <!-- Gold ring highlight -->
    <circle cx="55" cy="57" r="28" fill="none" stroke="#F5D87A" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- Subtle vignette overlay -->
  <rect width="120" height="120" rx="26" ry="26"
    fill="url(#bgGrad)" opacity="0.18" clip-path="url(#roundedClip)"/>
</svg>
