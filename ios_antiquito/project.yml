name: Antiquito

options:
  bundleIdPrefix: com.antiquito
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  Antiquito:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Antiquito
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antiquito.app
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Antiquito/Info.plist
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    info:
      path: Antiquito/Info.plist
      properties:
        CFBundleName: Antiquito
        CFBundleDisplayName: Antiquito
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        NSCameraUsageDescription: "Antiquito needs camera access to photograph and analyze antique objects."
        NSPhotoLibraryUsageDescription: "Antiquito needs photo library access to select images for analysis."
        GROQ_API_KEY: "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"
        FREE_SCAN_LIMIT: "1"
        LSRequiresIPhoneOS: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - armv7
